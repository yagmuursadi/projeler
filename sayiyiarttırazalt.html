<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Başlıksız Belge</title>
</head>

<body>
	<div style="background-color: lightblue;padding: 10px;">
	<input type="button" onClick="arttir()" value="Sayıyı Arttır">
	<h1 id="sayac">0</h1>	
	<input type="button" onClick="azalt()" value="Sayıyı Azalt">
	</div>
	
	<script>
	function arttir(){
		document.getElementById("sayac").innerHTML++;
	}
	function azalt(){
		document.getElementById("sayac").innerHTML--;
	}
	
	</script>
	
	
</body>
</html>
